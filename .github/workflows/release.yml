name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 태그에서 버전 추출 (v1.2.3 → 1.2.3)
      - name: Extract version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      # 배포용 DeepSeek 기본 키를 Secret에서 주입 (소스/히스토리에 키가 남지 않음)
      - name: Inject DeepSeek API key
        shell: pwsh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          $key = $env:DEEPSEEK_API_KEY
          if ([string]::IsNullOrWhiteSpace($key)) {
            Write-Host "DEEPSEEK_API_KEY secret 미설정 — 기본 키 없이 빌드합니다."
          } else {
            $file = "WinPilot/ViewModels/SettingsViewModel.cs"
            $content = Get-Content $file -Raw
            $from = 'private const string DefaultDeepSeekKey = "";'
            $to   = 'private const string DefaultDeepSeekKey = "' + $key + '";'
            if (-not $content.Contains($from)) { throw "DefaultDeepSeekKey 플레이스홀더를 찾지 못했습니다." }
            $content = $content.Replace($from, $to)
            Set-Content $file -Value $content -NoNewline -Encoding utf8
            Write-Host "DeepSeek 기본 키를 주입했습니다."
          }

      # ① 포터블 단일 EXE (GitHub Release 직접 다운로드용)
      - name: Publish portable EXE
        shell: pwsh
        run: |
          dotnet publish WinPilot/WinPilot.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishReadyToRun=true `
            -p:Version=${{ steps.ver.outputs.VERSION }} `
            -o publish

      # ② 인스톨러용 폴더 배포 (WPF 네이티브 DLL 모두 포함)
      - name: Publish for installer
        shell: pwsh
        run: |
          dotnet publish WinPilot/WinPilot.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=${{ steps.ver.outputs.VERSION }} `
            -o WinPilot/publish_installer

      # Inno Setup 설치 (GitHub Actions Windows 러너에 내장)
      - name: Build Installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc WinPilot/installer.iss /DAppVersion=${{ steps.ver.outputs.VERSION }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/WinPilot.exe
            WinPilot/installer_output/WinPilotSetup.exe
          generate_release_notes: true
          body: |
            ## WinPilot ${{ github.ref_name }}

            ### 설치 방법
            | 파일 | 설명 |
            |---|---|
            | **WinPilotSetup.exe** | 설치 프로그램 (권장) — 시작 메뉴 + 바탕화면 바로가기 생성 |
            | **WinPilot.exe** | 포터블 버전 — 설치 없이 바로 실행 |

            > **요구사항**: Windows 10/11 (64-bit), 관리자 권한
